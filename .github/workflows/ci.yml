name: CI

# Merge-validation gate for the engine scripts. Runs on every PR to main (and
# on main itself) so syntax errors and error-severity lint issues are caught
# before merge. Warnings are surfaced as annotations but do not block.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  powershell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse-check PowerShell scripts
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem agent/scripts -Filter *.ps1 -Recurse | ForEach-Object {
              $errors = $null
              [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$null, [ref]$errors) | Out-Null
              if ($errors) {
                  $failed = $true
                  Write-Host "::error file=$($_.FullName)::$($errors.Count) parse error(s)"
                  $errors | ForEach-Object { Write-Host "  line $($_.Extent.StartLineNumber): $($_.Message)" }
              } else {
                  Write-Host "OK: $($_.Name)"
              }
          }
          if ($failed) { throw 'PowerShell parse errors found.' }

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module PSScriptAnalyzer -Scope CurrentUser -Force

      - name: Lint (fail on Error severity)
        shell: pwsh
        run: |
          $results = @(Invoke-ScriptAnalyzer -Path agent/scripts -Recurse)
          $errors   = @($results | Where-Object Severity -eq 'Error')
          $warnings = @($results | Where-Object Severity -eq 'Warning')
          foreach ($e in $errors)   { Write-Host "::error file=$($e.ScriptPath),line=$($e.Line)::[$($e.RuleName)] $($e.Message)" }
          foreach ($w in $warnings) { Write-Host "::warning file=$($w.ScriptPath),line=$($w.Line)::[$($w.RuleName)] $($w.Message)" }
          Write-Host "PSScriptAnalyzer: $($errors.Count) error(s), $($warnings.Count) warning(s)"
          if ($errors.Count -gt 0) { throw "PSScriptAnalyzer found $($errors.Count) error-severity issue(s)." }
