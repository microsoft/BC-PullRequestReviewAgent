# Cuts a new engine version on every merge to main.
#
# Version format: v{major}.{minor}.{run_number}, where {major}.{minor} is the
# base read from the repo-root VERSION file (bump it deliberately for a new
# minor/major line) and {run_number} is this workflow's monotonically
# increasing run counter (the "build" number). Each merge therefore produces a
# fresh, pinnable version — consumers (BCApps, BC-Bench) pin `uses:`/`engine_ref`
# to the tag instead of a raw SHA.
#
# Each run creates a lightweight git tag at the merged commit, and force-moves a
# rolling major tag (e.g. v1) to it so consumers can pin `@v1` for the latest
# compatible engine. GitHub Releases (with notes) are cut manually for notable
# updates.

name: Version on merge

on:
  push:
    branches:
      - main

# Only the tag creation needs write; nothing here runs untrusted input.
permissions:
  contents: write

concurrency:
  group: version-on-merge
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        shell: bash
        run: |
          base="$(tr -d ' \t\r\n' < VERSION)"
          if [[ ! "$base" =~ ^[0-9]+\.[0-9]+$ ]]; then
            echo "::error::VERSION must contain a 'major.minor' value (got: '$base')"
            exit 1
          fi
          version="v${base}.${{ github.run_number }}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "major=v${base%%.*}" >> "$GITHUB_OUTPUT"
          echo "Computed engine version: $version"

      - name: Create and push tag
        run: |
          version="${{ steps.version.outputs.version }}"
          major="${{ steps.version.outputs.major }}"
          git tag "$version" "${{ github.sha }}"
          git push origin "$version"

          # Rolling major tag (e.g. v1): force-moved to each release so consumers
          # can pin `uses:`/`engine_ref` to `@v1` and always get the latest
          # compatible engine. Bump VERSION's major to start a v2 line.
          git tag -f "$major" "${{ github.sha }}"
          git push origin --force "$major"
