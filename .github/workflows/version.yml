# Cuts a new engine version on every merge to main.
#
# Version format: v{major}.{minor}.{bcquality}.{build}
#   {major}.{minor} — base read from the repo-root VERSION file (bump it
#                     deliberately for a new minor/major line).
#   {bcquality}     — the BCQuality content version this engine is pinned to,
#                     read from `bcquality.version` in agent/bcquality.config.yaml
#                     (BCQuality cuts a release ~monthly; bumped with its `ref`).
#   {build}         — incremented within the current {major}.{minor} line and
#                     reset whenever minor bumps (counts existing tags on the line).
# Each merge therefore produces a fresh, pinnable version — consumers (BCApps,
# BC-Bench) pin `uses:`/`engine_ref` to the tag instead of a raw SHA.
#
# Each run creates a lightweight git tag at the merged commit, and force-moves a
# rolling major tag (e.g. v1) to it so consumers can pin `@v1` for the latest
# compatible engine. GitHub Releases (with notes) are cut manually for notable
# updates.

name: Version on merge

on:
  push:
    branches:
      - main

# Only the tag creation needs write; nothing here runs untrusted input.
permissions:
  contents: write

concurrency:
  group: version-on-merge
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        shell: bash
        run: |
          base="$(tr -d ' \t\r\n' < VERSION)"
          if [[ ! "$base" =~ ^[0-9]+\.[0-9]+$ ]]; then
            echo "::error::VERSION must contain a 'major.minor' value (got: '$base')"
            exit 1
          fi
          major="${base%%.*}"
          minor="${base#*.}"

          # BCQuality content version (3rd segment): the `version:` line under
          # `bcquality:` in the config, bumped with `ref` on each monthly release.
          bcq="$(grep -E '^[[:space:]]*version:[[:space:]]*[0-9]+' agent/bcquality.config.yaml | head -1 | grep -oE '[0-9]+' | head -1)"
          if [[ -z "$bcq" ]]; then
            echo "::error::agent/bcquality.config.yaml must contain a numeric 'version:' under bcquality:"
            exit 1
          fi

          # Build id (4th segment): incremented within this major.minor line,
          # reset when minor bumps. Counts existing tags on the line.
          git fetch --tags --force --quiet
          build="$(( $(git tag -l "v${major}.${minor}.*" | wc -l) + 1 ))"

          version="v${major}.${minor}.${bcq}.${build}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "major=v${major}" >> "$GITHUB_OUTPUT"
          echo "Computed engine version: $version"

      - name: Create and push tag
        run: |
          version="${{ steps.version.outputs.version }}"
          major="${{ steps.version.outputs.major }}"
          git tag "$version" "${{ github.sha }}"
          git push origin "$version"

          # Rolling major tag (e.g. v1): force-moved to each release so consumers
          # can pin `uses:`/`engine_ref` to `@v1` and always get the latest
          # compatible engine. Bump VERSION's major to start a v2 line.
          git tag -f "$major" "${{ github.sha }}"
          git push origin --force "$major"
