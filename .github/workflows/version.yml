# Publishes a new PRReviewAgent version on every merge to main.
#
# Version format: X.Y.Z
#   X - Major. Breaking workflow-contract changes. Fixed at 1.
#   Y - Engine. Automatically increments for every new main commit.
#   Z - BCQuality. The minor of the pinned BCQuality content version.
#
# Existing X.Y.Z tags are the only engine-version state. Re-running the
# workflow for an already-tagged commit reuses that version.

name: Version on merge

on:
  push:
    branches:
      - main

# Only the tag creation needs write; nothing here runs untrusted input.
permissions:
  contents: write

concurrency:
  group: version-on-merge
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        shell: bash
        run: |
          git fetch --tags --force --quiet

          version="$(git tag --points-at "${GITHUB_SHA}" --list '[0-9]*.[0-9]*.[0-9]*' | { grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' || true; } | sort -V | tail -1)"
          if [[ -n "$version" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Commit already tagged as ${version}."
          else
            latest="$(git tag --list '1.*.*' | { grep -E '^1\.[0-9]+\.[0-9]+$' || true; } | sort -t. -k2,2n -k3,3n | tail -1)"
            engine_version=0
            if [[ -n "$latest" ]]; then
              IFS='.' read -r _ engine_version _ <<< "$latest"
            fi

            bcq_full="$({ grep -E '^[[:space:]]*version:[[:space:]]*"?[0-9]+\.[0-9]+' agents/ALReviewAgent/bcquality.config.yaml || true; } | head -1 | { grep -oE '[0-9]+\.[0-9]+' || true; } | head -1)"
            if [[ -z "$bcq_full" ]]; then
              echo "::error::agents/ALReviewAgent/bcquality.config.yaml must contain a major.minor BCQuality version"
              exit 1
            fi
            bcquality_version="${bcq_full#*.}"
            version="1.$((engine_version + 1)).${bcquality_version}"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Computed PRReviewAgent version: $version"

      - name: Create and push tag
        if: ${{ steps.version.outputs.exists == 'false' }}
        run: |
          version="${{ steps.version.outputs.version }}"
          git tag "$version" "${{ github.sha }}"
          git push origin "$version"

      - name: Move latest tag
        if: ${{ steps.version.outputs.exists == 'false' }}
        run: |
          git tag -f latest "${{ github.sha }}"
          git push origin --force latest
